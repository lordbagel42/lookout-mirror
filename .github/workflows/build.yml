name: Build & Push Images

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: lordbagel42

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: lookout-server
            dockerfile: Dockerfile.server
          - image: lookout-worker
            dockerfile: Dockerfile.worker

    steps:
      - name: Checkout hackclub/lookout
        uses: actions/checkout@v4
        with:
          repository: hackclub/lookout

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
